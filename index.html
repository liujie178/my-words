<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>英语单词通 - 深度定制版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --primary: #4f46e5; --success: #10b981; --warning: #f59e0b; }
        body { 
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif; 
            background: #f8fafc; 
            touch-action: manipulation; 
            -webkit-tap-highlight-color: transparent; 
        }
        .safe-pb { padding-bottom: calc(env(safe-area-inset-bottom) + 24px); }
        .safe-pt { padding-top: env(safe-area-inset-top); }
        .card-shadow { shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1); }
        .active-tab { color: var(--primary); transform: scale(1.1); font-weight: bold; }
        .list-max-h { max-height: calc(100vh - 320px); }
        /* 隐藏滚动条但保留功能 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <!-- 顶部状态栏 (中文) -->
    <header class="px-6 py-4 bg-white border-b flex justify-between items-center safe-pt shadow-sm">
        <div>
            <h1 class="text-xl font-black text-indigo-600 tracking-tight">英语单词通</h1>
            <div id="idx-text" class="text-[11px] text-gray-400 font-bold">词库加载中...</div>
        </div>
        <div class="flex items-center gap-3">
            <div class="text-right">
                <div id="mastery-perc" class="text-sm font-black text-emerald-500 leading-none">0%</div>
                <div class="text-[9px] text-gray-400 font-bold">掌握度</div>
            </div>
        </div>
    </header>

    <!-- 主内容区 -->
    <main class="flex-grow p-4 overflow-hidden flex flex-col relative">
        
        <!-- 1. 学习页面 -->
        <div id="page-study" class="flex-grow flex flex-col animate-in fade-in duration-300">
            <div class="flex-grow flex flex-col items-center justify-center py-2">
                <!-- 单词卡片 -->
                <div class="w-full max-w-md bg-white rounded-[2rem] shadow-xl p-6 relative border border-gray-50 flex flex-col h-full max-h-[500px]">
                    <button onclick="app.toggleFav()" id="btn-fav" class="absolute top-5 right-5 text-2xl transition-transform active:scale-125">☆</button>
                    
                    <div class="flex-grow flex flex-col justify-center items-center text-center">
                        <h2 id="word-text" class="text-4xl font-black text-gray-900 mb-2 tracking-tight">Word</h2>
                        
                        <!-- 双发音按钮 -->
                        <div class="flex gap-3 mb-6">
                            <button onclick="app.speak('en-GB')" class="bg-blue-50 text-blue-600 px-3 py-1.5 rounded-full text-xs font-bold border border-blue-100 active:bg-blue-600 active:text-white transition-all">
                                英 <span id="uk-phonetic">/--/</span>
                            </button>
                            <button onclick="app.speak('en-US')" class="bg-indigo-50 text-indigo-600 px-3 py-1.5 rounded-full text-xs font-bold border border-indigo-100 active:bg-indigo-600 active:text-white transition-all">
                                美 <span id="us-phonetic">/--/</span>
                            </button>
                        </div>

                        <!-- 含义及例句 -->
                        <div class="w-full text-left space-y-4 overflow-y-auto pr-1 no-scrollbar">
                            <div>
                                <div class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest mb-1">含义</div>
                                <p id="meaning-text" class="text-gray-800 text-lg font-bold leading-tight"></p>
                            </div>
                            <div class="p-4 bg-gray-50 rounded-2xl border border-gray-100">
                                <div class="flex justify-between items-center mb-1">
                                    <div class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">场景例句</div>
                                    <button onclick="app.speakExample()" class="text-indigo-500 text-xs font-bold flex items-center gap-1">
                                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5.586 15H4a1 1 0 01-1-1v-4a1 1 0 011-1h1.586l4.707-4.707C10.923 3.663 12 4.109 12 5v14c0 .891-1.077 1.337-1.707.707L5.586 15z"></path></svg>
                                        朗读
                                    </button>
                                </div>
                                <p id="ex-en" class="text-gray-700 text-sm italic font-medium leading-snug"></p>
                                <p id="ex-cn" class="text-gray-500 text-xs mt-2"></p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 左右切换箭头 -->
            <div class="flex justify-between items-center mb-4 px-4">
                <button onclick="app.prev()" class="p-2 text-gray-300 hover:text-indigo-500 transition-colors">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M15 19l-7-7 7-7"></path></svg>
                </button>
                <button onclick="app.next()" class="p-2 text-gray-300 hover:text-indigo-500 transition-colors">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7"></path></svg>
                </button>
            </div>

            <!-- 状态操作区 (模糊/熟悉) -->
            <div class="grid grid-cols-2 gap-4 mb-4">
                <button id="mark-vague" onclick="app.markStatus(1)" class="py-4 bg-white text-orange-500 rounded-2xl font-bold border-2 border-orange-50 shadow-sm active:scale-95 transition-all">
                    模糊 (待加强)
                </button>
                <button id="mark-known" onclick="app.markStatus(2)" class="py-4 bg-white text-emerald-500 rounded-2xl font-bold border-2 border-emerald-50 shadow-sm active:scale-95 transition-all">
                    熟悉 (减频)
                </button>
            </div>
        </div>

        <!-- 2. 个人中心页面 (单词列表) -->
        <div id="page-profile" class="hidden flex-grow flex flex-col animate-in slide-in-from-right-4 duration-300">
            <div class="flex justify-between items-end mb-4">
                <h2 class="text-2xl font-black text-gray-800">学习轨迹</h2>
                <div class="text-[10px] font-bold text-gray-400 bg-gray-100 px-2 py-1 rounded-md">
                    已学习: <span id="stat-learned-count">0</span> / <span id="stat-total-count">0</span>
                </div>
            </div>

            <!-- 分类过滤器 -->
            <div class="flex gap-2 mb-4 overflow-x-auto no-scrollbar pb-1">
                <button onclick="app.filterList('all')" id="filter-all" class="flex-shrink-0 px-4 py-2 bg-indigo-600 text-white rounded-full text-xs font-bold shadow-md shadow-indigo-100 transition-all">全部</button>
                <button onclick="app.filterList('fav')" id="filter-fav" class="flex-shrink-0 px-4 py-2 bg-white text-amber-500 border border-gray-100 rounded-full text-xs font-bold shadow-sm transition-all">收藏</button>
                <button onclick="app.filterList('vague')" id="filter-vague" class="flex-shrink-0 px-4 py-2 bg-white text-orange-500 border border-gray-100 rounded-full text-xs font-bold shadow-sm transition-all">模糊</button>
                <button onclick="app.filterList('known')" id="filter-known" class="flex-shrink-0 px-4 py-2 bg-white text-emerald-500 border border-gray-100 rounded-full text-xs font-bold shadow-sm transition-all">熟悉</button>
            </div>

            <!-- 列表区域 -->
            <div id="word-list-container" class="flex-grow overflow-y-auto no-scrollbar list-max-h space-y-2">
                <!-- 动态注入 -->
            </div>
        </div>

        <!-- 3. 设置页面 -->
        <div id="page-settings" class="hidden flex-grow animate-in slide-in-from-bottom-4 duration-300">
            <h2 class="text-2xl font-black text-gray-800 mb-6">设置与备份</h2>
            <div class="space-y-3">
                <div class="p-4 bg-white rounded-2xl border border-gray-100 shadow-sm">
                    <div class="text-xs font-bold text-gray-400 mb-3 uppercase">发音偏好</div>
                    <div class="flex gap-2">
                        <button onclick="app.setVoice('en-US')" id="cfg-us" class="flex-grow py-2 rounded-xl border-2 border-indigo-500 bg-indigo-50 text-indigo-700 text-xs font-bold">默认美音</button>
                        <button onclick="app.setVoice('en-GB')" id="cfg-uk" class="flex-grow py-2 rounded-xl border-2 border-gray-100 bg-white text-gray-400 text-xs font-bold">默认英音</button>
                    </div>
                </div>
                <button onclick="app.importJson()" class="w-full p-5 bg-white rounded-2xl border border-gray-100 shadow-sm font-bold flex items-center justify-between active:bg-gray-50">
                    <span>📥 导入词库 (JSON)</span>
                    <span class="text-gray-300">❯</span>
                </button>
                <button onclick="app.exportJson()" class="w-full p-5 bg-white rounded-2xl border border-gray-100 shadow-sm font-bold flex items-center justify-between active:bg-gray-50">
                    <span>📤 备份进度 (复制)</span>
                    <span class="text-gray-300">❯</span>
                </button>
                <button onclick="app.clearData()" class="w-full p-5 bg-white rounded-2xl border border-gray-100 shadow-sm font-bold text-red-500 flex items-center justify-between active:bg-red-50">
                    <span>🗑️ 清空所有数据</span>
                </button>
            </div>
        </div>
    </main>

    <!-- 底部导航 (全中文) -->
    <nav class="bg-white border-t border-gray-100 flex justify-around items-center px-4 safe-pb shadow-lg">
        <button onclick="app.switchTab('study')" id="nav-study" class="flex flex-col items-center py-2 px-6 active-tab">
            <span class="text-2xl mb-1">📖</span>
            <span class="text-[10px] uppercase">学习</span>
        </button>
        <button onclick="app.switchTab('profile')" id="nav-profile" class="flex flex-col items-center py-2 px-6 text-gray-400">
            <span class="text-2xl mb-1">👤</span>
            <span class="text-[10px] uppercase">个人</span>
        </button>
        <button onclick="app.switchTab('settings')" id="nav-settings" class="flex flex-col items-center py-2 px-6 text-gray-400">
            <span class="text-2xl mb-1">⚙️</span>
            <span class="text-[10px] uppercase">设置</span>
        </button>
    </nav>

    <script>
        const STORAGE_KEY = 'EN_MASTER_PRO_V1';
        
        // 扩展词库示例
        const DEFAULT_LIB = [
            {id:1,word:"Accomplish",us_phonetic:"/əˈkɑːmplɪʃ/",uk_phonetic:"/əˈkʌmplɪʃ/",meaning:"v. 完成，实现",example_en:"I can accomplish anything with hard work.",example_cn:"只要努力，我可以完成任何事情。"},
            {id:2,word:"Beneficial",us_phonetic:"/ˌbenɪˈfɪʃl/",uk_phonetic:"/ˌbenɪˈfɪʃl/",meaning:"adj. 有益的，有利的",example_en:"Exercise is beneficial to your health.",example_cn:"运动对你的健康有益。"},
            {id:3,word:"Challenge",us_phonetic:"/ˈtʃæləndʒ/",uk_phonetic:"/ˈtʃælɪndʒ/",meaning:"n./v. 挑战",example_en:"I like to challenge myself every day.",example_cn:"我喜欢每天挑战自己。"},
            {id:4,word:"Describe",us_phonetic:"/dɪˈskraɪb/",uk_phonetic:"/dɪˈskraɪb/",meaning:"v. 描写，叙述",example_en:"Can you describe the man you saw?",example_cn:"你能描述一下你看到的那个男人吗？"},
            {id:5,word:"Efficient",us_phonetic:"/ɪˈfɪʃnt/",uk_phonetic:"/ɪˈfɪʃnt/",meaning:"adj. 效率高的",example_en:"We need to find a more efficient way to work.",example_cn:"我们需要找到一种更高效率的工作方式。"},
            {id:6,word:"Flexible",us_phonetic:"/ˈfleksəbl/",uk_phonetic:"/ˈfleksəbl/",meaning:"adj. 灵活的",example_en:"My schedule is very flexible.",example_cn:"我的时间安排非常灵活。"},
            {id:7,word:"Grateful",us_phonetic:"/ˈɡreɪtfl/",uk_phonetic:"/ˈɡreɪtfl/",meaning:"adj. 感激的",example_en:"I am grateful for your help.",example_cn:"我很感激你的帮助。"},
            {id:8,word:"Hesitate",us_phonetic:"/ˈhezɪteɪt/",uk_phonetic:"/ˈhezɪteɪt/",meaning:"v. 犹豫",example_en:"Don't hesitate to contact me.",example_cn:"不要犹豫，请联系我。"},
            {id:9,word:"Imagine",us_phonetic:"/ɪˈmædʒɪn/",uk_phonetic:"/ɪˈmædʒɪn/",meaning:"v. 想象",example_en:"Imagine living on the moon.",example_cn:"想象一下住在月球上的样子。"},
            {id:10,word:"Journey",us_phonetic:"/ˈdʒɜːrni/",uk_phonetic:"/ˈdʒɜːni/",meaning:"n. 旅程",example_en:"The journey takes three hours.",example_cn:"这趟旅程需要三个小时。"},
            {id:11,word:"Knowledge",us_phonetic:"/ˈnɑːlɪdʒ/",uk_phonetic:"/ˈnɒlɪdʒ/",meaning:"n. 知识",example_en:"Knowledge is power.",example_cn:"知识就是力量。"}
        ];

        class WordApp {
            constructor() {
                this.words = [];
                this.history = {}; // { id: { s: 0/1/2, f: bool } } 状态s: 0-未标 1-模糊 2-熟悉
                this.currentIndex = 0;
                this.defaultVoice = 'en-US';
                this.filterType = 'all';
                this.visitedIndices = []; // 记录访问历史
                this.init();
            }

            init() {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    const data = JSON.parse(saved);
                    this.words = data.words || DEFAULT_LIB;
                    this.history = data.history || {};
                    this.currentIndex = data.currentIndex || 0;
                    this.defaultVoice = data.defaultVoice || 'en-US';
                    this.visitedIndices = data.visitedIndices || [];
                } else {
                    this.words = DEFAULT_LIB;
                }
                this.render();
                // 解锁移动端音频
                window.addEventListener('click', () => {
                    window.speechSynthesis.speak(new SpeechSynthesisUtterance(''));
                }, { once: true });
            }

            save() {
                try {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify({
                        words: this.words,
                        history: this.history,
                        currentIndex: this.currentIndex,
                        defaultVoice: this.defaultVoice,
                        visitedIndices: this.visitedIndices
                    }));
                    // 存储成功提示（可选）
                    // console.log('数据保存成功');
                } catch (error) {
                    // 处理存储失败的情况
                    console.warn('存储失败:', error);
                    // 可以在这里添加降级策略，比如只保存最重要的数据
                }
            }

            render() {
                const word = this.words[this.currentIndex];
                const state = this.history[word.id] || { s: 0, f: false };

                // 更新界面文字
                document.getElementById('word-text').innerText = word.word;
                document.getElementById('us-phonetic').innerText = word.us_phonetic;
                document.getElementById('uk-phonetic').innerText = word.uk_phonetic;
                document.getElementById('meaning-text').innerText = word.meaning;
                document.getElementById('ex-en').innerText = word.example_en;
                document.getElementById('ex-cn').innerText = word.example_cn;
                // 移除词库进度显示
                document.getElementById('idx-text').innerText = '智能学习模式';

                // 收藏按钮
                const favBtn = document.getElementById('btn-fav');
                favBtn.innerText = state.f ? '★' : '☆';
                favBtn.style.color = state.f ? 'var(--warning)' : '#d1d5db';

                // 模糊/熟悉按钮状态
                const bVague = document.getElementById('mark-vague');
                const bKnown = document.getElementById('mark-known');
                
                bVague.className = `py-4 rounded-2xl font-bold border-2 transition-all active:scale-95 ${state.s === 1 ? 'bg-orange-50 border-orange-400 text-orange-600 shadow-inner' : 'bg-white border-orange-50 text-orange-500 shadow-sm'}`;
                bKnown.className = `py-4 rounded-2xl font-bold border-2 transition-all active:scale-95 ${state.s === 2 ? 'bg-emerald-50 border-emerald-400 text-emerald-600 shadow-inner' : 'bg-white border-emerald-50 text-emerald-500 shadow-sm'}`;

                // 掌握度统计 (熟悉占100%，模糊占30%)
                const stats = Object.values(this.history);
                const score = stats.reduce((acc, cur) => acc + (cur.s === 2 ? 1 : (cur.s === 1 ? 0.3 : 0)), 0);
                const mastery = Math.min(100, Math.round((score / this.words.length) * 100));
                document.getElementById('mastery-perc').innerText = mastery + '%';

                // 设置页发音状态
                document.getElementById('cfg-us').className = `flex-grow py-2 rounded-xl border-2 transition-all ${this.defaultVoice === 'en-US' ? 'border-indigo-500 bg-indigo-50 text-indigo-700' : 'border-gray-100 bg-white text-gray-400'}`;
                document.getElementById('cfg-uk').className = `flex-grow py-2 rounded-xl border-2 transition-all ${this.defaultVoice === 'en-GB' ? 'border-indigo-500 bg-indigo-50 text-indigo-700' : 'border-gray-100 bg-white text-gray-400'}`;

                // 自动播放默认发音
                this.speak(this.defaultVoice);
                this.renderProfileList();
            }

            // 核心逻辑：带权重的随机跳转
            next() {
                // 记录当前索引到历史
                if (this.visitedIndices.length === 0 || this.visitedIndices[this.visitedIndices.length - 1] !== this.currentIndex) {
                    this.visitedIndices.push(this.currentIndex);
                    // 限制历史记录长度
                    if (this.visitedIndices.length > 50) {
                        this.visitedIndices.shift();
                    }
                }

                // 计算每个单词的权重
                const weightedWords = this.words.map((word, index) => {
                    const state = this.history[word.id] || { s: 0, f: false };
                    let weight = 1; // 默认权重
                    if (state.s === 1) weight = 3; // 模糊的单词权重更高
                    if (state.s === 2) weight = 0.5; // 熟悉的单词权重降低但仍会出现
                    return { index, weight };
                });

                // 计算总权重
                const totalWeight = weightedWords.reduce((sum, item) => sum + item.weight, 0);

                // 随机选择
                let random = Math.random() * totalWeight;
                for (const item of weightedWords) {
                    random -= item.weight;
                    if (random <= 0) {
                        this.currentIndex = item.index;
                        break;
                    }
                }

                this.save();
                this.render();
            }

            prev() {
                // 从历史记录中返回上一个单词
                if (this.visitedIndices.length > 0) {
                    this.currentIndex = this.visitedIndices.pop();
                    this.save();
                    this.render();
                }
            }

            markStatus(s) {
                const id = this.words[this.currentIndex].id;
                if (!this.history[id]) this.history[id] = { s: 0, f: false };
                // 允许切换和取消
                this.history[id].s = (this.history[id].s === s) ? 0 : s;
                this.save();
                this.render();
            }

            toggleFav() {
                const id = this.words[this.currentIndex].id;
                if (!this.history[id]) this.history[id] = { s: 0, f: false };
                this.history[id].f = !this.history[id].f;
                this.save();
                this.render();
            }

            speak(lang) {
                window.speechSynthesis.cancel();
                const word = this.words[this.currentIndex].word;
                const msg = new SpeechSynthesisUtterance(word);
                msg.lang = lang;
                msg.rate = 0.8;
                window.speechSynthesis.speak(msg);
            }

            speakExample() {
                window.speechSynthesis.cancel();
                const example = this.words[this.currentIndex].example_en;
                const msg = new SpeechSynthesisUtterance(example);
                msg.lang = this.defaultVoice;
                msg.rate = 0.8;
                window.speechSynthesis.speak(msg);
            }

            switchTab(t) {
                const tabs = ['study', 'profile', 'settings'];
                tabs.forEach(tab => {
                    document.getElementById(`page-${tab}`).classList.toggle('hidden', tab !== t);
                    const nav = document.getElementById(`nav-${tab}`);
                    if (tab === t) {
                        nav.classList.add('active-tab');
                        nav.classList.remove('text-gray-400');
                    } else {
                        nav.classList.remove('active-tab');
                        nav.classList.add('text-gray-400');
                    }
                });
            }

            renderProfileList() {
                const container = document.getElementById('word-list-container');
                container.innerHTML = '';
                
                const filtered = this.words.filter(w => {
                    const h = this.history[w.id] || { s:0, f:false };
                    if (this.filterType === 'fav') return h.f;
                    if (this.filterType === 'vague') return h.s === 1;
                    if (this.filterType === 'known') return h.s === 2;
                    return true;
                });

                document.getElementById('stat-learned-count').innerText = Object.keys(this.history).length;
                document.getElementById('stat-total-count').innerText = this.words.length;

                if (filtered.length === 0) {
                    container.innerHTML = `<div class="text-center py-10 text-gray-400 text-sm italic">暂无对应单词记录</div>`;
                    return;
                }

                filtered.forEach((w, i) => {
                    const h = this.history[w.id] || { s:0, f:false };
                    const div = document.createElement('div');
                    div.className = "bg-white p-4 rounded-2xl flex justify-between items-center border border-gray-100 shadow-sm active:bg-indigo-50 transition-colors";
                    div.onclick = () => {
                        this.currentIndex = this.words.findIndex(x => x.id === w.id);
                        this.switchTab('study');
                        this.render();
                    };
                    
                    let statusTag = '';
                    if (h.s === 1) statusTag = '<span class="px-2 py-0.5 bg-orange-100 text-orange-600 text-[9px] rounded-md ml-2 font-bold">模糊</span>';
                    if (h.s === 2) statusTag = '<span class="px-2 py-0.5 bg-emerald-100 text-emerald-600 text-[9px] rounded-md ml-2 font-bold">熟悉</span>';
                    if (h.f) statusTag += '<span class="ml-1">⭐</span>';

                    div.innerHTML = `
                        <div>
                            <span class="font-bold text-gray-800">${w.word}</span>
                            ${statusTag}
                        </div>
                        <div class="text-xs text-gray-400 font-medium truncate ml-4 max-w-[150px]">${w.meaning}</div>
                    `;
                    container.appendChild(div);
                });
            }

            filterList(type) {
                this.filterType = type;
                ['all', 'fav', 'vague', 'known'].forEach(t => {
                    const btn = document.getElementById('filter-' + t);
                    if(t === type) {
                        btn.className = "flex-shrink-0 px-4 py-2 bg-indigo-600 text-white rounded-full text-xs font-bold shadow-md transition-all";
                    } else {
                        btn.className = "flex-shrink-0 px-4 py-2 bg-white text-gray-500 border border-gray-100 rounded-full text-xs font-bold shadow-sm transition-all";
                    }
                });
                this.renderProfileList();
            }

            setVoice(v) { this.defaultVoice = v; this.save(); this.render(); }
            
            clearData() {
                if(confirm('清空后所有进度将丢失，确认吗？')) {
                    localStorage.removeItem(STORAGE_KEY);
                    location.reload();
                }
            }

            importJson() {
                const s = prompt('请粘贴 JSON 词库内容：');
                if(s) {
                    try {
                        const d = JSON.parse(s);
                        this.words = d.words || d;
                        this.history = d.history || {};
                        this.currentIndex = 0;
                        this.save(); this.render();
                    } catch(e) { alert('无效的JSON格式'); }
                }
            }

            exportJson() {
                const data = JSON.stringify({
                    words: this.words,
                    history: this.history,
                    currentIndex: this.currentIndex,
                    defaultVoice: this.defaultVoice
                });
                const t = document.createElement('textarea');
                t.value = data; document.body.appendChild(t); t.select();
                document.execCommand('copy'); document.body.removeChild(t);
                alert('已将完整进度复制到剪贴板！');
            }
        }

        const app = new WordApp();
    </script>
</body>
</html>
