    <script>
        const STORAGE_KEY = 'EN_MASTER_PRO_V1';
        
        // жү©еұ•иҜҚеә“зӨәдҫӢ
        const DEFAULT_LIB = [
            {id:1,word:"Accomplish",us_phonetic:"/ЙҷЛҲkЙ‘ЛҗmplЙӘКғ/",uk_phonetic:"/ЙҷЛҲkКҢmplЙӘКғ/",meaning:"v. е®ҢжҲҗпјҢе®һзҺ°",example_en:"I can accomplish anything with hard work.",example_cn:"еҸӘиҰҒеҠӘеҠӣпјҢжҲ‘еҸҜд»Ҙе®ҢжҲҗд»»дҪ•дәӢжғ…гҖӮ"},
            {id:2,word:"Beneficial",us_phonetic:"/ЛҢbenЙӘЛҲfЙӘКғl/",uk_phonetic:"/ЛҢbenЙӘЛҲfЙӘКғl/",meaning:"adj. жңүзӣҠзҡ„пјҢжңүеҲ©зҡ„",example_en:"Exercise is beneficial to your health.",example_cn:"иҝҗеҠЁеҜ№дҪ зҡ„еҒҘеә·жңүзӣҠгҖӮ"},
            {id:3,word:"Challenge",us_phonetic:"/ЛҲtКғГҰlЙҷndК’/",uk_phonetic:"/ЛҲtКғГҰlЙӘndК’/",meaning:"n./v. жҢ‘жҲҳ",example_en:"I like to challenge myself every day.",example_cn:"жҲ‘е–ңж¬ўжҜҸеӨ©жҢ‘жҲҳиҮӘе·ұгҖӮ"},
            {id:4,word:"Describe",us_phonetic:"/dЙӘЛҲskraЙӘb/",uk_phonetic:"/dЙӘЛҲskraЙӘb/",meaning:"v. жҸҸеҶҷпјҢеҸҷиҝ°",example_en:"Can you describe the man you saw?",example_cn:"дҪ иғҪжҸҸиҝ°дёҖдёӢдҪ зңӢеҲ°зҡ„йӮЈдёӘз”·дәәеҗ—пјҹ"},
            {id:5,word:"Efficient",us_phonetic:"/ЙӘЛҲfЙӘКғnt/",uk_phonetic:"/ЙӘЛҲfЙӘКғnt/",meaning:"adj. ж•ҲзҺҮй«ҳзҡ„",example_en:"We need to find a more efficient way to work.",example_cn:"жҲ‘д»¬йңҖиҰҒжүҫеҲ°дёҖз§Қжӣҙй«ҳж•ҲзҺҮзҡ„е·ҘдҪңж–№ејҸгҖӮ"},
            {id:6,word:"Flexible",us_phonetic:"/ЛҲfleksЙҷbl/",uk_phonetic:"/ЛҲfleksЙҷbl/",meaning:"adj. зҒөжҙ»зҡ„",example_en:"My schedule is very flexible.",example_cn:"жҲ‘зҡ„ж—¶й—ҙе®үжҺ’йқһеёёзҒөжҙ»гҖӮ"},
            {id:7,word:"Grateful",us_phonetic:"/ЛҲЙЎreЙӘtfl/",uk_phonetic:"/ЛҲЙЎreЙӘtfl/",meaning:"adj. ж„ҹжҝҖзҡ„",example_en:"I am grateful for your help.",example_cn:"жҲ‘еҫҲж„ҹжҝҖдҪ зҡ„её®еҠ©гҖӮ"},
            {id:8,word:"Hesitate",us_phonetic:"/ЛҲhezЙӘteЙӘt/",uk_phonetic:"/ЛҲhezЙӘteЙӘt/",meaning:"v. зҠ№иұ«",example_en:"Don't hesitate to contact me.",example_cn:"дёҚиҰҒзҠ№иұ«пјҢиҜ·иҒ”зі»жҲ‘гҖӮ"},
            {id:9,word:"Imagine",us_phonetic:"/ЙӘЛҲmГҰdК’ЙӘn/",uk_phonetic:"/ЙӘЛҲmГҰdК’ЙӘn/",meaning:"v. жғіиұЎ",example_en:"Imagine living on the moon.",example_cn:"жғіиұЎдёҖдёӢдҪҸеңЁжңҲзҗғдёҠзҡ„ж ·еӯҗгҖӮ"},
            {id:10,word:"Journey",us_phonetic:"/ЛҲdК’ЙңЛҗrni/",uk_phonetic:"/ЛҲdК’ЙңЛҗni/",meaning:"n. ж—…зЁӢ",example_en:"The journey takes three hours.",example_cn:"иҝҷи¶ҹж—…зЁӢйңҖиҰҒдёүдёӘе°Ҹж—¶гҖӮ"},
            {id:11,word:"Knowledge",us_phonetic:"/ЛҲnЙ‘ЛҗlЙӘdК’/",uk_phonetic:"/ЛҲnЙ’lЙӘdК’/",meaning:"n. зҹҘиҜҶ",example_en:"Knowledge is power.",example_cn:"зҹҘиҜҶе°ұжҳҜеҠӣйҮҸгҖӮ"}
        ];

        class WordApp {
            constructor() {
                this.words = [];
                this.history = {}; // { id: { s: 0/1/2, f: bool } } зҠ¶жҖҒs: 0-жңӘж Ү 1-жЁЎзіҠ 2-зҶҹжӮү
                this.currentIndex = 0;
                this.defaultVoice = 'en-US';
                this.filterType = 'all';
                this.visitedIndices = []; // и®°еҪ•и®ҝй—®еҺҶеҸІ
                this.init();
            }

            async init() {
                const saved = localStorage.getItem(STORAGE_KEY);
                if (saved) {
                    const data = JSON.parse(saved);
                    this.words = data.words || [];
                    this.history = data.history || {};
                    this.currentIndex = data.currentIndex || 0;
                    this.defaultVoice = data.defaultVoice || 'en-US';
                    this.visitedIndices = data.visitedIndices || [];
                    console.log('д»Һжң¬ең°еӯҳеӮЁеҠ иҪҪж•°жҚ®пјҢеҚ•иҜҚж•°йҮҸ:', this.words.length);
                } else {
                    // зӣҙжҺҘдҪҝз”Ё5жҳҹеҚ•иҜҚж•°жҚ®дҪңдёәй»ҳи®ӨиҜҚеә“
                    console.log('дҪҝз”Ё5жҳҹеҚ•иҜҚдҪңдёәй»ҳи®ӨиҜҚеә“');
                    // иҝҷйҮҢжҲ‘д»¬е°ҶзӣҙжҺҘдҪҝз”Ё5жҳҹеҚ•иҜҚж•°жҚ®
                    // з”ұдәҺfetchеҸҜиғҪеңЁжң¬ең°ж–Үд»¶зі»з»ҹдёӯеҸ—йҷҗпјҢжҲ‘д»¬е°ҶйҮҮз”ЁеҸҰдёҖз§Қж–№ејҸ
                    // дҪҶйҰ–е…Ҳе°қиҜ•йҖҡиҝҮfetchеҠ иҪҪ
                    try {
                        console.log('е°қиҜ•йҖҡиҝҮfetchеҠ иҪҪ5жҳҹеҚ•иҜҚ.json');
                        const response = await fetch('5жҳҹеҚ•иҜҚ.json');
                        if (response.ok) {
                            this.words = await response.json();
                            console.log('жҲҗеҠҹеҠ иҪҪ5жҳҹеҚ•иҜҚ.jsonпјҢеҚ•иҜҚж•°йҮҸ:', this.words.length);
                        } else {
                            console.error('еҠ иҪҪиҜҚеә“еӨұиҙҘ:', response.status);
                            // з”ұдәҺfetchеӨұиҙҘпјҢжҲ‘д»¬е°ҶдҪҝз”ЁDEFAULT_LIB
                            this.words = DEFAULT_LIB;
                            console.log('дҪҝз”Ёй»ҳи®ӨиҜҚеә“пјҢеҚ•иҜҚж•°йҮҸ:', this.words.length);
                        }
                    } catch (error) {
                        console.error('еҠ иҪҪиҜҚеә“еҮәй”ҷ:', error);
                        // з”ұдәҺfetchеӨұиҙҘпјҢжҲ‘д»¬е°ҶдҪҝз”ЁDEFAULT_LIB
                        this.words = DEFAULT_LIB;
                        console.log('дҪҝз”Ёй»ҳи®ӨиҜҚеә“пјҢеҚ•иҜҚж•°йҮҸ:', this.words.length);
                    }
                }
                this.render();
                // и§Јй”Ғз§»еҠЁз«Ҝйҹійў‘
                window.addEventListener('click', () => {
                    window.speechSynthesis.speak(new SpeechSynthesisUtterance(''));
                }, { once: true });
            }

            save() {
                try {
                    localStorage.setItem(STORAGE_KEY, JSON.stringify({
                        words: this.words,
                        history: this.history,
                        currentIndex: this.currentIndex,
                        defaultVoice: this.defaultVoice,
                        visitedIndices: this.visitedIndices
                    }));
                    // еӯҳеӮЁжҲҗеҠҹжҸҗзӨәпјҲеҸҜйҖүпјү
                    // console.log('ж•°жҚ®дҝқеӯҳжҲҗеҠҹ');
                } catch (error) {
                    // еӨ„зҗҶеӯҳеӮЁеӨұиҙҘзҡ„жғ…еҶө
                    console.warn('еӯҳеӮЁеӨұиҙҘ:', error);
                    // еҸҜд»ҘеңЁиҝҷйҮҢж·»еҠ йҷҚзә§зӯ–з•ҘпјҢжҜ”еҰӮеҸӘдҝқеӯҳжңҖйҮҚиҰҒзҡ„ж•°жҚ®
                }
            }

            render() {
                const word = this.words[this.currentIndex];
                const state = this.history[word.id] || { s: 0, f: false };

                // жӣҙж–°з•Ңйқўж–Үеӯ—
                document.getElementById('word-text').innerText = word.word;
                document.getElementById('us-phonetic').innerText = word.us_phonetic;
                document.getElementById('uk-phonetic').innerText = word.uk_phonetic;
                document.getElementById('meaning-text').innerText = word.meaning;
                document.getElementById('ex-en').innerText = word.example_en;
                document.getElementById('ex-cn').innerText = word.example_cn;
                // з§»йҷӨиҜҚеә“иҝӣеәҰжҳҫзӨә
                document.getElementById('idx-text').innerText = 'жҷәиғҪеӯҰд№ жЁЎејҸ';

                // ж”¶и—ҸжҢүй’®
                const favBtn = document.getElementById('btn-fav');
                favBtn.innerText = state.f ? 'вҳ…' : 'вҳҶ';
                favBtn.style.color = state.f ? 'var(--warning)' : '#d1d5db';

                // жЁЎзіҠ/зҶҹжӮүжҢүй’®зҠ¶жҖҒ
                const bVague = document.getElementById('mark-vague');
                const bKnown = document.getElementById('mark-known');
                
                bVague.className = `py-4 rounded-2xl font-bold border-2 transition-all active:scale-95 ${state.s === 1 ? 'bg-orange-50 border-orange-400 text-orange-600 shadow-inner' : 'bg-white border-orange-50 text-orange-500 shadow-sm'}`;
                bKnown.className = `py-4 rounded-2xl font-bold border-2 transition-all active:scale-95 ${state.s === 2 ? 'bg-emerald-50 border-emerald-400 text-emerald-600 shadow-inner' : 'bg-white border-emerald-50 text-emerald-500 shadow-sm'}`;

                // жҺҢжҸЎеәҰз»ҹи®Ў (зҶҹжӮүеҚ 100%пјҢжЁЎзіҠеҚ 30%)
                const stats = Object.values(this.history);
                const score = stats.reduce((acc, cur) => acc + (cur.s === 2 ? 1 : (cur.s === 1 ? 0.3 : 0)), 0);
                const mastery = Math.min(100, Math.round((score / this.words.length) * 100));
                document.getElementById('mastery-perc').innerText = mastery + '%';

                // и®ҫзҪ®йЎөеҸ‘йҹізҠ¶жҖҒ
                document.getElementById('cfg-us').className = `flex-grow py-2 rounded-xl border-2 transition-all ${this.defaultVoice === 'en-US' ? 'border-indigo-500 bg-indigo-50 text-indigo-700' : 'border-gray-100 bg-white text-gray-400'}`;
                document.getElementById('cfg-uk').className = `flex-grow py-2 rounded-xl border-2 transition-all ${this.defaultVoice === 'en-GB' ? 'border-indigo-500 bg-indigo-50 text-indigo-700' : 'border-gray-100 bg-white text-gray-400'}`;

                // иҮӘеҠЁж’ӯж”ҫй»ҳи®ӨеҸ‘йҹі
                this.speak(this.defaultVoice);
                this.renderProfileList();
            }

            // ж ёеҝғйҖ»иҫ‘пјҡеёҰжқғйҮҚзҡ„йҡҸжңәи·іиҪ¬
            next() {
                // и®°еҪ•еҪ“еүҚзҙўеј•еҲ°еҺҶеҸІ
                if (this.visitedIndices.length === 0 || this.visitedIndices[this.visitedIndices.length - 1] !== this.currentIndex) {
                    this.visitedIndices.push(this.currentIndex);
                    // йҷҗеҲ¶еҺҶеҸІи®°еҪ•й•ҝеәҰ
                    if (this.visitedIndices.length > 50) {
                        this.visitedIndices.shift();
                    }
                }

                // и®Ўз®—жҜҸдёӘеҚ•иҜҚзҡ„жқғйҮҚ
                const weightedWords = this.words.map((word, index) => {
                    const state = this.history[word.id] || { s: 0, f: false };
                    let weight = 1; // й»ҳи®ӨжқғйҮҚ
                    if (state.s === 1) weight = 3; // жЁЎзіҠзҡ„еҚ•иҜҚжқғйҮҚжӣҙй«ҳ
                    if (state.s === 2) weight = 0.5; // зҶҹжӮүзҡ„еҚ•иҜҚжқғйҮҚйҷҚдҪҺдҪҶд»ҚдјҡеҮәзҺ°
                    return { index, weight };
                });

                // и®Ўз®—жҖ»жқғйҮҚ
                const totalWeight = weightedWords.reduce((sum, item) => sum + item.weight, 0);

                // йҡҸжңәйҖүжӢ©
                let random = Math.random() * totalWeight;
                for (const item of weightedWords) {
                    random -= item.weight;
                    if (random <= 0) {
                        this.currentIndex = item.index;
                        break;
                    }
                }

                this.save();
                this.render();
            }

            prev() {
                // д»ҺеҺҶеҸІи®°еҪ•дёӯиҝ”еӣһдёҠдёҖдёӘеҚ•иҜҚ
                if (this.visitedIndices.length > 0) {
                    this.currentIndex = this.visitedIndices.pop();
                    this.save();
                    this.render();
                }
            }

            markStatus(s) {
                const id = this.words[this.currentIndex].id;
                if (!this.history[id]) this.history[id] = { s: 0, f: false };
                // е…Ғи®ёеҲҮжҚўе’ҢеҸ–ж¶Ҳ
                this.history[id].s = (this.history[id].s === s) ? 0 : s;
                this.save();
                this.render();
            }

            toggleFav() {
                const id = this.words[this.currentIndex].id;
                if (!this.history[id]) this.history[id] = { s: 0, f: false };
                this.history[id].f = !this.history[id].f;
                this.save();
                this.render();
            }

            speak(lang) {
                window.speechSynthesis.cancel();
                const word = this.words[this.currentIndex].word;
                const msg = new SpeechSynthesisUtterance(word);
                msg.lang = lang;
                msg.rate = 0.8;
                window.speechSynthesis.speak(msg);
            }

            speakExample() {
                window.speechSynthesis.cancel();
                const example = this.words[this.currentIndex].example_en;
                const msg = new SpeechSynthesisUtterance(example);
                msg.lang = this.defaultVoice;
                msg.rate = 0.8;
                window.speechSynthesis.speak(msg);
            }

            switchTab(t) {
                const tabs = ['study', 'profile', 'settings'];
                tabs.forEach(tab => {
                    document.getElementById(`page-${tab}`).classList.toggle('hidden', tab !== t);
                    const nav = document.getElementById(`nav-${tab}`);
                    if (tab === t) {
                        nav.classList.add('active-tab');
                        nav.classList.remove('text-gray-400');
                    } else {
                        nav.classList.remove('active-tab');
                        nav.classList.add('text-gray-400');
                    }
                });
            }

            renderProfileList() {
                const container = document.getElementById('word-list-container');
                container.innerHTML = '';
                
                const filtered = this.words.filter(w => {
                    const h = this.history[w.id] || { s:0, f:false };
                    if (this.filterType === 'fav') return h.f;
                    if (this.filterType === 'vague') return h.s === 1;
                    if (this.filterType === 'known') return h.s === 2;
                    return true;
                });

                document.getElementById('stat-learned-count').innerText = Object.keys(this.history).length;
                document.getElementById('stat-total-count').innerText = this.words.length;

                if (filtered.length === 0) {
                    container.innerHTML = `<div class="text-center py-10 text-gray-400 text-sm italic">жҡӮж— еҜ№еә”еҚ•иҜҚи®°еҪ•</div>`;
                    return;
                }

                filtered.forEach((w, i) => {
                    const h = this.history[w.id] || { s:0, f:false };
                    const div = document.createElement('div');
                    div.className = "bg-white p-4 rounded-2xl flex justify-between items-center border border-gray-100 shadow-sm active:bg-indigo-50 transition-colors";
                    div.onclick = () => {
                        this.currentIndex = this.words.findIndex(x => x.id === w.id);
                        this.switchTab('study');
                        this.render();
                    };
                    
                    let statusTag = '';
                    if (h.s === 1) statusTag = '<span class="px-2 py-0.5 bg-orange-100 text-orange-600 text-[9px] rounded-md ml-2 font-bold">жЁЎзіҠ</span>';
                    if (h.s === 2) statusTag = '<span class="px-2 py-0.5 bg-emerald-100 text-emerald-600 text-[9px] rounded-md ml-2 font-bold">зҶҹжӮү</span>';
                    if (h.f) statusTag += '<span class="ml-1">вӯҗ</span>';

                    div.innerHTML = `
                        <div>
                            <span class="font-bold text-gray-800">${w.word}</span>
                            ${statusTag}
                        </div>
                        <div class="text-xs text-gray-400 font-medium truncate ml-4 max-w-[150px]">${w.meaning}</div>
                    `;
                    container.appendChild(div);
                });
            }

            filterList(type) {
                this.filterType = type;
                ['all', 'fav', 'vague', 'known'].forEach(t => {
                    const btn = document.getElementById('filter-' + t);
                    if(t === type) {
                        btn.className = "flex-shrink-0 px-4 py-2 bg-indigo-600 text-white rounded-full text-xs font-bold shadow-md transition-all";
                    } else {
                        btn.className = "flex-shrink-0 px-4 py-2 bg-white text-gray-500 border border-gray-100 rounded-full text-xs font-bold shadow-sm transition-all";
                    }
                });
                this.renderProfileList();
            }

            setVoice(v) { this.defaultVoice = v; this.save(); this.render(); }
            
            clearData() {
                if(confirm('жё…з©әеҗҺжүҖжңүиҝӣеәҰе°ҶдёўеӨұпјҢзЎ®и®Өеҗ—пјҹ')) {
                    localStorage.removeItem(STORAGE_KEY);
                    location.reload();
                }
            }

            importJson() {
                const s = prompt('иҜ·зІҳиҙҙ JSON иҜҚеә“еҶ…е®№пјҡ');
                if(s) {
                    try {
                        const d = JSON.parse(s);
                        this.words = d.words || d;
                        this.history = d.history || {};
                        this.currentIndex = 0;
                        this.save(); this.render();
                    } catch(e) { alert('ж— ж•Ҳзҡ„JSONж јејҸ'); }
                }
            }

            exportJson() {
                const data = JSON.stringify({
                    words: this.words,
                    history: this.history,
                    currentIndex: this.currentIndex,
                    defaultVoice: this.defaultVoice
                });
                const t = document.createElement('textarea');
                t.value = data; document.body.appendChild(t); t.select();
                document.execCommand('copy'); document.body.removeChild(t);
                alert('е·Іе°Ҷе®Ңж•ҙиҝӣеәҰеӨҚеҲ¶еҲ°еүӘиҙҙжқҝпјҒ');
            }

            async loadFiveStarWords() {
                try {
                    console.log('ејҖе§ӢеҠ иҪҪ5жҳҹеҚ•иҜҚ.json');
                    // е°қиҜ•дҪҝз”ЁдёҚеҗҢзҡ„и·Ҝеҫ„
                    const paths = ['5жҳҹеҚ•иҜҚ.json', './5жҳҹеҚ•иҜҚ.json'];
                    let loaded = false;
                    
                    for (const path of paths) {
                        try {
                            console.log('е°қиҜ•и·Ҝеҫ„:', path);
                            const response = await fetch(path);
                            if (response.ok) {
                                this.words = await response.json();
                                console.log('жҲҗеҠҹеҠ иҪҪ5жҳҹеҚ•иҜҚ.jsonпјҢеҚ•иҜҚж•°йҮҸ:', this.words.length);
                                this.history = {}; // йҮҚзҪ®еӯҰд№ еҺҶеҸІ
                                this.currentIndex = 0;
                                this.save();
                                this.render();
                                alert('жҲҗеҠҹеҠ иҪҪ5жҳҹеҚ•иҜҚпјҢе…ұ ' + this.words.length + ' дёӘеҚ•иҜҚпјҒ');
                                loaded = true;
                                break;
                            } else {
                                console.error('еҠ иҪҪиҜҚеә“еӨұиҙҘ:', response.status, 'и·Ҝеҫ„:', path);
                            }
                        } catch (error) {
                            console.error('еҠ иҪҪиҜҚеә“еҮәй”ҷ:', error, 'и·Ҝеҫ„:', path);
                        }
                    }
                    
                    if (!loaded) {
                        alert('еҠ иҪҪ5жҳҹеҚ•иҜҚеӨұиҙҘпјҢиҜ·жЈҖжҹҘж–Үд»¶жҳҜеҗҰеӯҳеңЁгҖӮ');
                    }
                } catch (error) {
                    console.error('еҠ иҪҪиҜҚеә“еҮәй”ҷ:', error);
                    alert('еҠ иҪҪ5жҳҹеҚ•иҜҚеҮәй”ҷпјҢиҜ·жЈҖжҹҘзҪ‘з»ңиҝһжҺҘжҲ–ж–Үд»¶и·Ҝеҫ„гҖӮ');
                }
            }
        }

        const app = new WordApp();
    </script>
</body>
